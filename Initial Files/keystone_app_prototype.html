<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keystone — App Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#FDFBF7;--bg2:#F5F0E8;--bg3:#EDE6DA;--white:#FFFFFF;--t1:#2C1810;--t2:#5A5A5A;--t3:#9A9590;--b1:#E0D5C8;--b2:#C8BBAD;--clay:#8B4513;--sand:#D4A574;--success:#2D6A4F;--success-bg:#EDF7ED;--warning:#BC6C25;--warning-bg:#FFF8E7;--danger:#9B2226;--danger-bg:#FDEDED;--info:#1B4965;--info-bg:#E8F0F5;--r:10px;--rm:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#E8E0D5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.device{background:#C8BBAD;border-radius:20px;padding:10px;max-width:960px;width:100%;box-shadow:0 20px 60px rgba(44,24,16,.2)}
.frame{border-radius:14px;overflow:hidden;border:1px solid var(--b1);background:var(--bg);display:flex;height:680px}

/* SIDEBAR */
.side{width:220px;background:var(--t1);color:var(--sand);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto}
.side-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(212,165,116,.1)}
.side-logo h2{font-size:16px;font-weight:600;color:#F5E6D3;letter-spacing:-.3px}
.side-logo p{font-size:8px;letter-spacing:2px;text-transform:uppercase;opacity:.3;margin-top:3px}
.sgrp{padding:12px 0}
.sgl{font-size:8px;text-transform:uppercase;letter-spacing:2px;opacity:.25;padding:0 20px;margin-bottom:6px;font-weight:500}
.si{display:flex;align-items:center;gap:10px;padding:8px 20px;font-size:12px;cursor:pointer;opacity:.4;transition:all .15s;border-left:2.5px solid transparent;color:var(--sand)}
.si:hover{opacity:.65;background:rgba(212,165,116,.05)}
.si.on{opacity:1;background:rgba(212,165,116,.08);border-left-color:var(--sand);color:#F5E6D3}
.si svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.side-foot{margin-top:auto;padding:14px 20px;border-top:1px solid rgba(212,165,116,.1);display:flex;align-items:center;gap:10px}
.sav{width:30px;height:30px;border-radius:50%;background:rgba(212,165,116,.15);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--sand)}
.sinfo .sn{font-size:11px;color:#F5E6D3}
.sinfo .se{font-size:9px;opacity:.35}

/* CONTENT */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:14px 24px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;background:var(--white);flex-shrink:0}
.topbar h3{font-size:14px;font-weight:600;color:var(--t1)}
.tbr{display:flex;gap:8px;align-items:center}
.badge{font-size:9px;padding:4px 10px;border-radius:20px;font-weight:500}
.bg-s{background:var(--success-bg);color:var(--success)}
.bg-w{background:var(--warning-bg);color:var(--warning)}
.bg-i{background:var(--info-bg);color:var(--info)}
.bg-d{background:var(--danger-bg);color:var(--danger)}
.scr{flex:1;padding:20px 24px;overflow-y:auto;background:var(--bg)}

/* COMPONENTS */
.sl{font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:2px;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:0.5px;background:var(--b1)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.st{background:var(--white);border:1px solid var(--b1);border-radius:var(--rm);padding:12px;text-align:center}
.st .v{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:500;color:var(--t1)}
.st .l{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}
.cd{background:var(--white);border:1px solid var(--b1);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.cd h4{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:5px}
.cd p{font-size:11px;color:var(--t2);line-height:1.65}
.tr{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--b1);font-size:11px}
.tr:last-child{border-bottom:none}
.ck{width:15px;height:15px;border:1.5px solid var(--b2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ck.d{background:var(--success);border-color:var(--success)}
.ck.d::after{content:'';width:5px;height:3px;border-left:1.5px solid var(--white);border-bottom:1.5px solid var(--white);transform:rotate(-45deg) translateY(-1px)}
.tt{flex:1;color:var(--t2)}
.tt.d{text-decoration:line-through;opacity:.3}
.tg{font-size:8px;padding:3px 8px;border-radius:12px;font-weight:500;white-space:nowrap}
.al{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:var(--rm);margin-bottom:6px;font-size:10px;line-height:1.55}
.al svg{width:13px;height:13px;flex-shrink:0;margin-top:1px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sh h4{font-size:12px;font-weight:600;color:var(--t1)}
.sh a{font-size:9px;color:var(--info);cursor:pointer;text-decoration:none}
.ps{display:flex;gap:2px;margin-bottom:12px}
.pd{flex:1;height:5px;border-radius:3px;background:var(--b1)}
.pd.dn{background:var(--success)}
.pd.cr{background:var(--t1)}
.pl{display:flex;justify-content:space-between;font-size:7px;color:var(--t3);margin-top:3px;letter-spacing:.3px}

/* Budget */
.br{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--b1);font-size:11px}
.br:last-child{border-bottom:none}
.bc{flex:1;color:var(--t2)}
.be{width:65px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3)}
.ba{width:65px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:10px}
.bw{width:70px;height:5px;background:var(--b1);border-radius:3px;margin-left:8px;overflow:hidden}
.bf{height:100%;border-radius:3px}

/* Gantt */
.gr{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--b1);font-size:10px}
.gr:last-child{border-bottom:none}
.gn{width:90px;color:var(--t2);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gt{flex:1;height:12px;background:var(--bg2);border-radius:3px;position:relative;overflow:hidden}
.gf{position:absolute;height:100%;border-radius:3px;top:0}

/* Contacts */
.cc{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--b1);border-radius:var(--rm);margin-bottom:6px;cursor:pointer;background:var(--white);transition:all .12s}
.cc:hover{border-color:var(--b2);box-shadow:0 2px 8px rgba(44,24,16,.05)}
.ca{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.cn{font-size:12px;font-weight:500;color:var(--t1)}
.ct{font-size:9px;color:var(--t3)}

/* Docs */
.di{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--b1);cursor:pointer}
.di:last-child{border-bottom:none}
.dk{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dk svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.dn{font-size:12px;font-weight:500;color:var(--t1)}
.dd{font-size:9px;color:var(--t3)}

/* Photos */
.pg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.pt{aspect-ratio:1;background:var(--bg2);border-radius:var(--rm);display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid var(--b1);position:relative;cursor:pointer;transition:all .12s}
.pt:hover{border-color:var(--b2)}
.pt svg{width:18px;height:18px;stroke:var(--t3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.phl{font-size:8px;color:var(--t3);margin-top:3px}
.pht{position:absolute;bottom:4px;right:4px;font-size:7px;padding:2px 6px;border-radius:3px;background:var(--t1);color:var(--sand);opacity:.7}

/* Chat */
.msgs{flex:1}
.msg{margin-bottom:10px;display:flex;gap:8px}
.mav{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
.mav.ai{background:var(--bg2);color:var(--clay)}
.mav.us{background:var(--t1);color:var(--sand)}
.mb{font-size:11px;line-height:1.65;color:var(--t2);max-width:82%;padding:10px 14px;border-radius:12px;background:var(--white);border:1px solid var(--b1)}
.mb.us{background:var(--t1);color:#F5E6D3;border-color:var(--t1)}
.cin{display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--b1);margin-top:12px}
.cin input{flex:1;font-size:11px;font-family:'DM Sans',sans-serif;padding:8px 12px;border:1px solid var(--b1);border-radius:var(--rm);background:var(--white);outline:none;color:var(--t1)}
.cin input:focus{border-color:var(--clay)}
.cin button{font-size:11px;padding:8px 16px;font-family:'DM Sans',sans-serif;background:var(--t1);color:#F5E6D3;border:1px solid var(--t1);border-radius:var(--rm);cursor:pointer}

/* Wizard */
.wz{text-align:center;padding:20px}
.wz h3{font-size:16px;font-weight:600;color:var(--t1);margin-bottom:4px}
.wz>p{font-size:12px;color:var(--t2);margin-bottom:18px}
.wo{display:grid;gap:8px;max-width:320px;margin:0 auto}
.wop{padding:14px 16px;border:1px solid var(--b1);border-radius:var(--r);cursor:pointer;text-align:left;transition:all .12s;background:var(--white)}
.wop:hover{border-color:var(--b2);background:var(--bg2)}
.wop.sel{border-color:var(--t1);border-width:2px;background:var(--bg2)}
.wop h5{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:2px}
.wop p{font-size:10px;color:var(--t3);margin:0}
.wdots{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
.wdots span{width:8px;height:8px;border-radius:50%;background:var(--b1)}
.wdots span.on{background:var(--t1)}
.wbtn{display:flex;justify-content:center;gap:8px;margin-top:20px}
.wbtn button{font-size:12px;padding:9px 24px;font-family:'DM Sans',sans-serif;border:1px solid var(--b2);border-radius:var(--rm);background:var(--white);cursor:pointer;color:var(--t1)}
.wbtn .primary{background:var(--t1);color:#F5E6D3;border-color:var(--t1)}

/* Log */
.le{padding:10px 0;border-bottom:1px solid var(--b1)}
.le:last-child{border-bottom:none}
.ld{font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:3px}
.lt{font-size:11px;color:var(--t2);line-height:1.65}

/* Milestone row */
.mi{font-size:10px;color:var(--t2);padding:6px 0;border-bottom:1px solid var(--b1)}
.mi:last-child{border-bottom:none}
.mi span{font-family:'JetBrains Mono',monospace;color:var(--t3);margin-right:6px;font-size:9px}

@media(max-width:700px){
  .frame{flex-direction:column;height:auto}
  .side{width:100%;flex-direction:row;overflow-x:auto;padding:8px}
  .sgrp,.side-foot,.side-logo p,.sgl{display:none}
  .side-logo{padding:8px 12px;border:none}
  .si{padding:6px 10px;font-size:10px;border-left:none;border-bottom:2px solid transparent;white-space:nowrap}
  .si.on{border-bottom-color:var(--sand);border-left:none}
  .sg{grid-template-columns:1fr 1fr}
  .pg{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="device">
<div class="frame">
<div class="side">
  <div class="side-logo"><h2>Keystone</h2><p>Build with confidence</p></div>
  <div class="sgrp">
    <div class="sgl">Main</div>
    <div class="si on" onclick="go('dash')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> Dashboard</div>
    <div class="si" onclick="go('wiz')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> New project</div>
    <div class="si" onclick="go('learn')"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg> Learn</div>
  </div>
  <div class="sgrp" id="pN" style="display:none">
    <div class="sgl">Robinson residence</div>
    <div class="si on" onclick="go('ov')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Overview</div>
    <div class="si" onclick="go('tk')"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg> Tasks</div>
    <div class="si" onclick="go('bu')"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg> Budget</div>
    <div class="si" onclick="go('sc')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Schedule</div>
    <div class="si" onclick="go('tm')"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg> Team</div>
    <div class="si" onclick="go('dc')"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Documents</div>
    <div class="si" onclick="go('ph')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Photos</div>
    <div class="si" onclick="go('lg')"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> Daily log</div>
    <div class="si" onclick="go('ai')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> AI assistant</div>
  </div>
  <div class="side-foot"><div class="sav">AK</div><div class="sinfo"><div class="sn">Ayo K.</div><div class="se">Builder plan</div></div></div>
</div>

<div class="main">
  <div class="topbar"><h3 id="tH">Dashboard</h3><div class="tbr"><span class="badge bg-s" id="tB">2 projects</span></div></div>
  <div class="scr" id="S"></div>
</div>
</div>
</div>

<script>
const E=id=>document.getElementById(id),Q=s=>document.querySelectorAll(s);
function sn(id){Q('.si').forEach(i=>i.classList.remove('on'));const m={dash:'dashboard',wiz:'new project',learn:'learn',ov:'overview',tk:'tasks',bu:'budget',sc:'schedule',tm:'team',dc:'documents',ph:'photos',lg:'daily log',ai:'ai assistant'};Q('.si').forEach(i=>{if(i.textContent.trim().toLowerCase().includes(m[id]||''))i.classList.add('on')})}
function go(id){sn(id);const ip=['ov','tk','bu','sc','tm','dc','ph','lg','ai'].includes(id);E('pN').style.display=ip?'block':'none';if(ip)sn(id);V[id]()}
const V={};

V.dash=()=>{E('tH').textContent='Dashboard';E('tB').textContent='2 projects';E('tB').className='badge bg-s';
E('S').innerHTML=`<div class="sl">Your projects</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px"><div class="cd" style="cursor:pointer" onclick="go('ov')"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><h4>Robinson residence</h4><span class="tg bg-w">Phase 6: Build</span></div><p>4 bed / 3 bath / 2,200 sf / Houston, TX</p><div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-bottom:3px"><span>Overall progress</span><span style="font-family:'JetBrains Mono',monospace">62%</span></div><div style="height:4px;background:var(--b1);border-radius:2px;overflow:hidden"><div style="width:62%;height:100%;background:var(--success);border-radius:2px"></div></div></div><div style="display:flex;gap:12px;margin-top:10px;font-size:9px;color:var(--t3)"><span>Budget: $385K</span><span>Spent: $239K</span><span>8.5 mo</span></div></div><div class="cd" style="cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><h4>Lome rental duplex</h4><span class="tg bg-i">Phase 2: Land</span></div><p>2x 2-bed / 180 m&#xB2; / Adidogome, Lome, Togo</p><div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-bottom:3px"><span>Overall progress</span><span style="font-family:'JetBrains Mono',monospace">18%</span></div><div style="height:4px;background:var(--b1);border-radius:2px;overflow:hidden"><div style="width:18%;height:100%;background:var(--info);border-radius:2px"></div></div></div><div style="display:flex;gap:12px;margin-top:10px;font-size:9px;color:var(--t3)"><span>Budget: CFA 42M</span><span>Spent: CFA 7.5M</span><span>7 mo</span></div></div></div>
<div class="sl">Recent activity</div>
<div class="al" style="background:var(--success-bg);color:var(--success)"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Framing inspection passed -- Robinson residence (2 hrs ago)</div>
<div class="al" style="background:var(--warning-bg);color:var(--warning)"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Interior finishes trending 8% over estimate -- review recommended</div>
<div class="al" style="background:var(--info-bg);color:var(--info)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg> Lome duplex: titre foncier verified at DCCFE. Proceed to offer.</div>`};

V.wiz=()=>{E('tH').textContent='New project';E('tB').textContent='Setup wizard';E('tB').className='badge bg-i';
E('S').innerHTML=`<div class="wz"><div class="wdots"><span class="on"></span><span></span><span></span><span></span><span></span></div><h3>What are you building for?</h3><p>This determines your financing options, tax treatment, and design priorities.</p><div class="wo"><div class="wop sel" onclick="Q('.wop').forEach(o=>o.classList.remove('sel'));this.classList.add('sel')"><h5>Build to occupy</h5><p>A home for you and your family to live in</p></div><div class="wop" onclick="Q('.wop').forEach(o=>o.classList.remove('sel'));this.classList.add('sel')"><h5>Build to rent</h5><p>Investment property generating rental income</p></div><div class="wop" onclick="Q('.wop').forEach(o=>o.classList.remove('sel'));this.classList.add('sel')"><h5>Build to sell</h5><p>Spec home built for resale profit</p></div></div><div class="wbtn"><button onclick="go('dash')">Cancel</button><button class="primary" onclick="wz2()">Next</button></div></div>`};
