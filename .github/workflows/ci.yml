name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=apps/web

      - name: Type check
        run: npx tsc --noEmit --project apps/web/tsconfig.json

  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspace=apps/web

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]

    env:
      # Minimal env vars required for Next.js build (no real secrets)
      NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
      NEXT_PUBLIC_FIREBASE_DATABASE_URL: "https://placeholder.firebaseio.com"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
      STRIPE_SECRET_KEY: "sk_test_placeholder"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=apps/web

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: Check for secrets in code
        run: |
          # Simple secret detection — flags common patterns
          if grep -rn "sk_live_\|sk_test_[A-Za-z0-9]\{20,\}" --include="*.ts" --include="*.tsx" --include="*.js" apps/ packages/ 2>/dev/null; then
            echo "::error::Possible Stripe secret key found in source code!"
            exit 1
          fi
          echo "No secrets detected in source files."
